<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Fun Facts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f4f4;
        }
        header {
            background: linear-gradient(to right, #0072ff, #00c6ff);
            width: 100%;
            padding: 20px;
            color: white;
            text-align: center;
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            margin: 0 15px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .index-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
            margin: 10px;
            transition: transform 0.2s;
        }
        .index-card:hover {
            transform: scale(1.05);
        }
        footer {
            background: #00274d;
            color: white;
            width: 100%;
            position: relative;
            padding: 20px;
            margin-top: auto;
        }
        footer h4 {
            margin-bottom: 10px;
        }
        footer div {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Chemistry Fun Facts</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <main>
        <div class="index-card">
            <h2>Fact 1</h2>
            <p>Chemistry is the study of matter.</p>
        </div>
        <div class="index-card">
            <h2>Fact 2</h2>
            <p>Water is a chemical compound made of hydrogen and oxygen.</p>
        </div>
        <!-- More index cards as needed -->
    </main>
    <footer>
        <div>
            <h4>Contact Us</h4>
            <p>Email: example@mail.com</p>
        </div>
        <div>
            <h4>Social Media</h4>
            <p>Follow us on social media!</p>
        </div>
        <div>
            <h4>About Us</h4>
            <p>We share fun facts about chemistry!</p>
        </div>
    </footer>
</body>
</html>
